{% extends 'base.html' %}

{% block title %}Login - Travel Reservation{% endblock %}

{% block content %}
<div class="col-12">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card" style="border: none; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-box-arrow-in-right" style="font-size: 3rem; color: var(--primary-color);"></i>
                        <h2 class="mt-3" style="color: var(--secondary-color); font-weight: 700;">Welcome Back</h2>
                        <p class="text-muted">Sign in to your TravelHub account</p>
                    </div>

                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Username or Email</label>
                            <input type="text" class="form-control" id="id_username" name="username" required autofocus>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="id_password" name="password" required>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                            <label class="form-check-label" for="remember_me">Remember me</label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary-custom btn-lg w-100">
                            <i class="bi bi-box-arrow-in-right"></i> Sign In
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-muted">Don't have an account? <a href="{% url 'users:register' %}" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
